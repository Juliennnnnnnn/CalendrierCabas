    apiKey:"AIzaSyCgZjS47NCGWWJScgIyWki0XSubBFmVUdk",
    authDomain:"calendrier-cabas-liassoi-be21d.firebaseapp.com",
    databaseURL:"https://calendrier-cabas-liassoi-be21d-default-rtdb.europe-west1.firebasedatabase.app",

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surface:#fff;--border:#ddd;--text:#1a1a1a;
  --muted:#666;--accent:#c0392b;--weekend:#e8e8e8;
  --navy:#2c3e50;--green:#27ae60;--radius:4px;
  --shadow:0 2px 12px rgba(0,0,0,.08);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:12px}
.topbar{display:flex;align-items:center;gap:12px;margin-bottom:8px;flex-wrap:wrap}
.btn-sm{padding:5px 14px;border:1.5px solid var(--border);border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;background:var(--surface);color:var(--text);transition:all .15s}
.btn-sm:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
.statusbar{font-size:.72rem;color:var(--muted);margin-left:auto}
.statusbar.ok{color:var(--green)}.statusbar.err{color:var(--accent)}

/* MODAL LOGIN */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal-overlay.hidden{display:none}
.modal{background:var(--surface);border-radius:10px;padding:28px 32px;width:360px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal h2{font-size:1rem;font-weight:700;margin-bottom:16px}
.modal input[type=password]{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:.84rem;margin-bottom:12px;outline:none}
.modal input:focus{border-color:var(--navy)}
.modal .btn-row{display:flex;gap:8px;margin-top:4px}
.modal-err{color:var(--accent);font-size:.76rem;margin-bottom:8px;display:none}
.modal-err.show{display:block}

/* NAV */
.nav-bar{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.nav-bar button{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:6px 14px;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;color:var(--text);transition:background .1s}
.nav-bar button:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
.nav-bar span{font-size:.82rem;color:var(--muted);font-weight:500}

/* LAYOUT */
.layout{display:flex;gap:24px;align-items:flex-start}

/* CALENDRIER */
.calendar-wrap{background:var(--surface);border-radius:8px;box-shadow:var(--shadow);overflow:hidden;flex:1;min-width:0}
.cal-table{width:100%;border-collapse:collapse;table-layout:fixed}
.cal-table td{border:1px solid var(--border);padding:0;vertical-align:top;height:22px}
.td-label{font-size:.88rem;font-weight:600;padding:2px 4px;line-height:1.25;text-align:center;vertical-align:middle;overflow:hidden}
.td-label .l1{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.td-label .l2{display:block;font-weight:400;font-size:.78rem;opacity:.88;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}

/* PANNEAU ADMIN — form + liste côte à côte */
.admin-wrap{display:flex;gap:12px;align-items:flex-start;flex-shrink:0}
.admin-wrap.hidden{display:none}
.side-panel{background:var(--surface);border-radius:8px;box-shadow:var(--shadow);padding:16px;width:310px;flex-shrink:0}
.list-panel{background:var(--surface);border-radius:8px;box-shadow:var(--shadow);padding:16px;width:250px;flex-shrink:0;max-height:calc(100vh - 120px);overflow-y:auto}
.list-panel h3{font-size:.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;position:sticky;top:0;background:var(--surface);padding-bottom:4px;z-index:1}
.past-section{margin-top:12px;border-top:2px dashed var(--border);padding-top:8px}
.past-title{font-size:.68rem;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}

/* ONGLETS */
.tabs{display:flex;gap:4px;margin-bottom:14px}
.tab{flex:1;padding:7px 4px;border:1.5px solid var(--border);border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:.76rem;font-weight:600;cursor:pointer;background:#f8f8f8;color:var(--muted);text-align:center;transition:all .15s}
.tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}

.tab-content{display:none}.tab-content.active{display:block}

/* FORM */
.field{margin-bottom:10px}
.field label{display:block;font-size:.72rem;font-weight:600;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
.field input[type=date],.field input[type=text],.field input[type=number]{width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:.82rem;color:var(--text);background:#fafafa;outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--navy);background:#fff}
.hint{font-size:.67rem;color:#aaa;margin-top:2px;font-style:italic}
.sep{border:none;border-top:1px dashed var(--border);margin:10px 0}

.color-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.swatch{width:24px;height:24px;border-radius:4px;cursor:pointer;border:2.5px solid transparent;transition:transform .1s,border-color .1s;flex-shrink:0}
.swatch:hover{transform:scale(1.1)}
.swatch.sel{border-color:var(--text);transform:scale(1.1)}
.custom-color{display:flex;align-items:center;gap:6px;margin-top:5px}
input[type=color]{width:30px;height:30px;border:1.5px solid var(--border);border-radius:4px;padding:2px;cursor:pointer;background:none}

.btn{width:100%;padding:9px;background:var(--navy);color:#fff;border:none;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:.84rem;font-weight:600;cursor:pointer;transition:opacity .15s;margin-top:6px}
.btn:hover{opacity:.85}
.btn.danger{background:var(--accent);margin-top:4px}
.btn.warning{background:#e67e22;margin-top:4px}

/* LISTE EVENTS */
.events-list{margin-top:14px;border-top:2px solid var(--border);padding-top:10px}
.events-list h3{font-size:.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.ev-group{margin-bottom:8px}
.ev-group-title{font-size:.68rem;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.06em;padding:2px 0;border-bottom:1px solid #eee;margin-bottom:4px}
.ev-item{display:flex;align-items:flex-start;gap:6px;padding:5px 6px;border-radius:4px;background:#f8f8f8;margin-bottom:4px;font-size:.74rem}
.ev-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;margin-top:2px}
.ev-info{flex:1;min-width:0}
.ev-info strong{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:.75rem}
.ev-info .sub{display:block;color:#888;font-size:.65rem;font-style:italic}
.ev-info .dates{display:block;color:var(--muted);font-size:.66rem}
.ev-actions{display:flex;gap:2px;flex-shrink:0}
.del-btn,.edit-btn{background:none;border:none;cursor:pointer;font-size:.85rem;padding:2px 3px;border-radius:2px}
.del-btn{color:var(--muted)}.del-btn:hover{background:#fee;color:var(--accent)}
.edit-btn{color:#2980b9}.edit-btn:hover{background:#ebf5fb}
.empty-msg{font-size:.72rem;color:#bbb;font-style:italic}

.hidden{display:none!important}
.version{position:fixed;bottom:6px;right:10px;font-size:.62rem;color:#bbb;font-family:'DM Mono',monospace;pointer-events:none}
</style>
</head>
<body>

  <div class="modal" style="width:500px;max-width:95vw">
    <h2>📨 Message commande <span id="msgModalNum"></span></h2>
    <div id="msgPreview" style="background:#f0f9eb;border:1px solid #c3e6cb;border-radius:6px;padding:12px;margin-bottom:12px;font-size:.84rem;line-height:1.7;white-space:pre-wrap;font-family:'DM Sans',sans-serif;max-height:280px;overflow-y:auto"></div>
    <textarea id="msgEdit" style="width:100%;height:200px;padding:10px;border:1.5px solid var(--border);border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:.82rem;line-height:1.6;resize:vertical;outline:none;display:none"></textarea>
    <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">

<!-- MODAL LOGIN -->
<div class="modal-overlay hidden" id="loginModal">

<!-- TOP BAR ADMIN -->

  <button class="btn-sm" onclick="doLogout()">Déconnexion</button>

<div class="layout">

  <!-- PANNEAU ADMIN -->

    <div class="side-panel" id="formPanel">

    <!-- ONGLETS -->
    <div class="tabs">
      <div class="tab active" id="tabLibre" onclick="switchTab('libre')">Événement libre</div>

    <!-- ONGLET LIBRE -->
    <div class="tab-content active" id="contentLibre">

      <button class="btn" id="btnCmd" onclick="saveCmd()">＋ Ajouter</button>

    <!-- LISTE EVENTS -->

  </div><!-- /admin-wrap -->

<script>
// ════════════════════════════════════════════
const ADMIN_PWD = 'CabasLias2025';
const MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const DAYS   = ['dim.','lun.','mar.','mer.','jeu.','ven.','sam.'];
const PALETTE     = ['#c0392b','#e67e22','#f1c40f','#27ae60','#2980b9','#8e44ad','#1abc9c','#2c3e50'];
const TXT_PALETTE = ['#ffffff','#000000','#f5f5f5','#1a1a1a'];

let startOffset = 0;
let events      = [];
let isAdmin     = false;
let fbReady     = false;
let editingId   = null; // id de l'evt en cours d'édition (libre)
let editingCmdNum = null; // numéro de commande en cours d'édition

// Couleurs sélectionnées
let lColor='#2980b9', lTxtColor='#ffffff';
let cColor='#27ae60', dColor='#27ae60', cTxtColor='#ffffff';

// ── Firebase ─────────────────────────────────
function initFirebase() {
  const { onValue, eventsRef } = window._fb;
  onValue(eventsRef, snap => {
    const d = snap.val();
    events = d ? Object.values(d) : [];
    renderAll();
    setStatus('✅ Synchronisé','ok');
  }, () => { setStatus('ℹ️ Mode local',''); loadLocal(); });
}
function saveFb() {
  if (!fbReady) { saveLocal(); return; }
  const { set, eventsRef } = window._fb;
  const obj = {}; events.forEach(e => { obj[e.id] = e; });
  set(eventsRef, obj).then(() => setStatus('✅ Sauvegardé','ok'))
    .catch(() => { saveLocal(); setStatus('⚠️ Sauvegarde locale',''); });
}
function delFb(id) {
  if (!fbReady) { saveLocal(); return; }
  const { ref, remove, db } = window._fb;
  remove(ref(db, 'events/' + id));
}
function saveLocal() { localStorage.setItem('calEvents', JSON.stringify(events)); }
function loadLocal()  { events = JSON.parse(localStorage.getItem('calEvents')||'[]'); renderAll(); }
function setStatus(msg, cls) { const el=document.getElementById('statusbar'); el.textContent=msg; el.className='statusbar '+cls; }

// ── Auth ──────────────────────────────────────
function openLogin()  { document.getElementById('loginModal').classList.remove('hidden'); document.getElementById('pwdInput').focus(); }
function closeLogin() { document.getElementById('loginModal').classList.add('hidden'); document.getElementById('loginErr').classList.remove('show'); }
function doLogin() {
  if (document.getElementById('pwdInput').value === ADMIN_PWD) {
    isAdmin = true; sessionStorage.setItem('calAdmin','1');
    document.getElementById('pwdInput').value = ''; closeLogin(); applyMode();
  } else { document.getElementById('loginErr').classList.add('show'); }
}
function doLogout() {
  isAdmin = false; sessionStorage.removeItem('calAdmin');
  const url = new URL(window.location); url.searchParams.delete('admin');
  window.history.replaceState({},'',url); applyMode();
}
function applyMode() {
  document.getElementById('adminBar').classList.toggle('hidden', !isAdmin);
  document.getElementById('adminWrap').classList.toggle('hidden', !isAdmin);
  renderAll();
}

// ── Onglets ───────────────────────────────────
let activeTab = 'libre';
function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tabLibre').classList.toggle('active', tab==='libre');
  document.getElementById('tabCmd').classList.toggle('active', tab==='cmd');
  document.getElementById('contentLibre').classList.toggle('active', tab==='libre');
  document.getElementById('contentCmd').classList.toggle('active', tab==='cmd');
}

// ── Swatches ──────────────────────────────────
function buildSwatch(containerId, colors, getVal, setVal, border, pickerId) {
  const c = document.getElementById(containerId);
  colors.forEach(color => {
    const s = document.createElement('div');
    s.className = 'swatch' + (color===getVal()?' sel':'');
    s.style.background = color; s.dataset.color = color;
    if (border) s.style.border = color==='#ffffff'?'2px solid #ccc':'2px solid transparent';
    s.onclick = () => { c.querySelectorAll('.swatch').forEach(x=>x.classList.remove('sel')); s.classList.add('sel'); setVal(color); if(pickerId) document.getElementById(pickerId).value=color; };
    c.appendChild(s);
  });
  if (pickerId) {
    document.getElementById(pickerId).addEventListener('input', e => {
      setVal(e.target.value);
      c.querySelectorAll('.swatch').forEach(x=>x.classList.remove('sel'));
    });
  }
}

function buildAllSwatches() {
  buildSwatch('lSwatches',   PALETTE,     ()=>lColor,    v=>{lColor=v;},    false, 'lColorPicker');
  buildSwatch('lTxtSwatches',TXT_PALETTE, ()=>lTxtColor, v=>{lTxtColor=v;}, true);
  buildSwatch('cSwatches',   PALETTE,     ()=>cColor,    v=>{cColor=v; dColor=v; document.getElementById('dColorPicker').value=v; refreshDSwatches();}, false, 'cColorPicker');
  buildSwatch('dSwatches',   PALETTE,     ()=>dColor,    v=>{dColor=v;},    false, 'dColorPicker');
  buildSwatch('cTxtSwatches',TXT_PALETTE, ()=>cTxtColor, v=>{cTxtColor=v;}, true);
  document.getElementById('dColorPicker').addEventListener('input', e => {
    dColor = e.target.value;
    document.querySelectorAll('#dSwatches .swatch').forEach(x=>x.classList.remove('sel'));
  });
}

function refreshDSwatches() {
  const c = document.getElementById('dSwatches');
  c.querySelectorAll('.swatch').forEach(s => s.classList.toggle('sel', s.dataset.color===dColor));
}

function syncDistriColor() {
  dColor = document.getElementById('cColorPicker').value;
  document.getElementById('dColorPicker').value = dColor;
  refreshDSwatches();
}

function setSwatchSel(containerId, color) {
  document.querySelectorAll('#'+containerId+' .swatch').forEach(s => s.classList.toggle('sel', s.dataset.color===color));
}

// ── Formulaire Libre ──────────────────────────
function onLibreStartChange() {
  const s=document.getElementById('lStart').value, e=document.getElementById('lEnd').value;
  if (s && (!e||e<s)) document.getElementById('lEnd').value=s;
}

function saveLibre() {
  const label=document.getElementById('lLabel').value.trim();
  const start=document.getElementById('lStart').value;
  const end=document.getElementById('lEnd').value;
  if (!label||!start||!end) { alert('Remplissez tous les champs.'); return; }
  if (start>end) { alert('Date début > date fin.'); return; }

  if (editingId!==null) {
    const idx=events.findIndex(e=>e.id===editingId);
    if (idx!==-1) events[idx]={...events[idx], label, start, end, color:lColor, textColor:lTxtColor};
    editingId=null;
  } else {
    events.push({id:Date.now(), type:'libre', label, start, end, color:lColor, textColor:lTxtColor});
  }
  saveFb(); resetForms(); renderAll();
}

function onCmdStartChange() {
  const s=document.getElementById('cStart').value, e=document.getElementById('cEnd').value;
  if (s && (!e||e<s)) document.getElementById('cEnd').value=s;
}

function saveCmd() {
  const num   = parseInt(document.getElementById('cNum').value);
  const label = document.getElementById('cLabel').value.trim();
  const cStart= document.getElementById('cStart').value;
  const cEnd  = document.getElementById('cEnd').value;
  const dDate = document.getElementById('dDate').value;
  const cUrl  = document.getElementById('cUrl').value.trim();

  if (!num) { alert('Saisissez un numéro de commande.'); return; }
  if (!label && !dDate) { alert('Saisissez au moins un libellé ou une date de distribution.'); return; }

  // Contrôle doublon — sauf si on est en mode édition du même numéro
  if (editingCmdNum === null) {
    const exists = events.some(e => e.cmdNum === num && (e.type==='commande'||e.type==='distribution'));
    if (exists) {
      const ok = confirm(
        `Le numéro ${num} est déjà utilisé.\n\n` +
        `• Pour modifier l'existant : annulez et cliquez ✏️ dans la liste.\n` +
        `• Pour insérer un nouveau ${num} : cliquez OK pour décaler tous les numéros ≥ ${num} de +1.\n\n` +
        `Décaler les numéros ≥ ${num} ?`
      );
      if (!ok) return; // refus → on ne crée rien
      events.forEach(e => { if ((e.type==='commande'||e.type==='distribution') && e.cmdNum>=num) e.cmdNum++; });
    }
  }

  // Supprimer anciens evt de ce numéro si édition
  if (editingCmdNum!==null) {
    events = events.filter(e => !(e.cmdNum===editingCmdNum && (e.type==='commande'||e.type==='distribution')));
    editingCmdNum=null;
  }

  if (label && cStart && cEnd) {
    events.push({id:Date.now(), type:'commande', cmdNum:num, label, url:cUrl, start:cStart, end:cEnd, color:cColor, textColor:cTxtColor});
  }
  if (dDate) {
    events.push({id:Date.now()+1, type:'distribution', cmdNum:num, label:label||'', start:dDate, end:dDate, color:dColor, textColor:cTxtColor});
  }

  saveFb(); resetForms(); renderAll();
}

const DAYS_LONG  = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
const MONTHS_LONG= ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

function fmtDateLong(iso) {
  const [y,m,d] = iso.split('-').map(Number);
  const dow = new Date(y,m-1,d).getDay();
  return `${DAYS_LONG[dow]} ${d} ${MONTHS_LONG[m-1]}`;
}

let _currentMsgNum = null;

let _editMode = false;

function generateMsg(num) {
  const cmd  = events.find(e=>e.type==='commande'&&e.cmdNum===num);
  const dist = events.find(e=>e.type==='distribution'&&e.cmdNum===num);
  const label = (cmd?.label||'').split('+').map(s=>s.trim()).filter(Boolean)[0]||'';
  const url   = cmd?.url||'';
  const dateFin  = cmd?.end  ? fmtDateLong(cmd.end)  : '?';
  const dateDist = dist?.start? fmtDateLong(dist.start): '?';

  return `*Commande ${num} ouverte*\n` +
    `Fin des commandes : *${dateFin} 21h00*\n` +
    `Livraison : *${dateDist} (18h30-19h30)*\n` +
    `Cliquez ici ${url} pour passer commande.\n\n` +
    `Pour cette commande vous trouverez les produits ${label} et également nos fournisseurs habituels Terravie, FolizKombucha, Marty, JP alaux, ...\n \n` +

    `N'hésitez pas à transférer, tous les liassoises et liassois, habitants, travailleurs et parents d'enfants scolarisés à Lias peuvent commander.\n` +
    `https://www.lecabasliassois.fr/`;
}

function renderMsgPreview(text) {

function copyMsg() {
  // Copier le texte brut avec les * (format WhatsApp)
  const text = _editMode
    ? document.getElementById('msgEdit').value
    : _defaultMsg.replace(/\n/g,'\n'); // texte brut avec *

  // Si en mode aperçu, reconstruire depuis _defaultMsg ou msgEdit
  const toCopy = _editMode
    ? document.getElementById('msgEdit').value
    : document.getElementById('msgEdit').value || _defaultMsg;

  navigator.clipboard.writeText(_editMode ? document.getElementById('msgEdit').value : _defaultMsg)
    .then(() => {
      document.getElementById('msgCopied').style.display = 'block';
      setTimeout(()=>{ document.getElementById('msgCopied').style.display='none'; }, 3000);
    })
    .catch(() => {

      document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
      document.getElementById('msgCopied').style.display = 'block';
      setTimeout(()=>{ document.getElementById('msgCopied').style.display='none'; }, 3000);
    });

// ── Calendrier ────────────────────────────────
function getNbMonths() { return window.innerWidth<700?2:4; }
function getMonths() {
  const nb=getNbMonths(), now=new Date();
  // startOffset=0 → mois courant en premier
  const base=new Date(now.getFullYear(),now.getMonth()+startOffset,1);
  return Array.from({length:nb},(_,i)=>{const d=new Date(base.getFullYear(),base.getMonth()+i,1);return{year:d.getFullYear(),month:d.getMonth()};});
}
const daysInMonth=(y,m)=>new Date(y,m+1,0).getDate();
const toIso=(y,m,d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const fmtDate=iso=>{const[y,m,d]=iso.split('-');return`${d}/${m}/${y}`;};

// Construit la liste des "blocs" à afficher pour un jour donné
function eventsForDay(iso) {
  const result = [];
  // Événements libres et commandes
  events.forEach(ev => {
    if (ev.type==='libre'||ev.type==='commande'||!ev.type) {
      if (iso>=ev.start && iso<=ev.end) result.push(ev);
    }
  });
  // Distributions : grouper celles du même jour
  const dists = events.filter(e=>e.type==='distribution'&&e.start===iso);
  if (dists.length>0) {
    // Créer un pseudo-événement groupé
    const nums = dists.map(d=>d.cmdNum).sort((a,b)=>a-b);
    result.push({
      id:'dist_'+iso, type:'distribution_group',
      nums, start:iso, end:iso,
      color: dists[0].color,
      textColor: dists[0].textColor||'#fff'
    });
  }
  return result;
}

function getDisplayLabel(ev) {
  if (!ev.type||ev.type==='libre') {
    const p=ev.label.split('+').map(s=>s.trim()).filter(Boolean);
    return {l1:p[0]||'',l2:p[1]||''};
  }
  if (ev.type==='commande') {
    const p=(ev.label||'').split('+').map(s=>s.trim()).filter(Boolean);
    return {l1:`Commande ${ev.cmdNum}`, l2:p[0]||''};
  }
  if (ev.type==='distribution_group') {
    // Chercher un libellé dans les commandes liées, sinon dans le label stocké
    const l2parts = ev.nums.map(num => {
      const cmd = events.find(e => e.type==='commande' && e.cmdNum===num);
      if (cmd && cmd.label) {
        const p = cmd.label.split('+').map(s=>s.trim()).filter(Boolean);
        return p[0]||'';
      }
      // Pas de commande → utiliser le label prévu stocké dans la distri
      const dist = events.find(e => e.type==='distribution' && e.cmdNum===num);
      return (dist && dist.label) ? dist.label.split('+')[0].trim() : '';
    }).filter(Boolean);
    return {l1:'Distribution '+ev.nums.join(' / '), l2: l2parts.length===1 ? l2parts[0] : ''};
  }
  return {l1:'',l2:''};
}

function renderCalendar() {
  const months=getMonths(), nb=months.length;
  const table=document.getElementById('calGrid');
  table.innerHTML='';
  const f=months[0],l=months[nb-1];
  document.getElementById('rangeLabel').textContent=`${MONTHS[f.month]} ${f.year} → ${MONTHS[l.month]} ${l.year}`;

  // Colgroup
  const cg=document.createElement('colgroup');
  months.forEach(()=>{const c1=document.createElement('col');c1.style.width='55px';cg.appendChild(c1);cg.appendChild(document.createElement('col'));});
  table.appendChild(cg);

  // Thead
  const thead=document.createElement('thead'),hdrRow=document.createElement('tr');
  months.forEach(({year,month},idx)=>{
    const th=document.createElement('th');th.colSpan=2;th.textContent=`${MONTHS[month]} ${year}`;
    th.style.cssText=['background:var(--navy)','color:#fff','text-align:center','padding:8px 4px','font-size:.82rem','font-weight:600','text-transform:uppercase','letter-spacing:.08em',idx<nb-1?'border-right:1px solid #3d556b':'border-right:none'].join(';');
    hdrRow.appendChild(th);
  });
  thead.appendChild(hdrRow);table.appendChild(thead);

  // Pré-calcul
  const monthsData=months.map(({year,month})=>{
    const days=daysInMonth(year,month),arr=[];
    for(let d=1;d<=days;d++){const iso=toIso(year,month,d),dow=new Date(year,month,d).getDay();arr.push({day:d,dow,iso,evs:eventsForDay(iso)});}
    return{year,month,days:arr};
  });

  const maxDays=Math.max(...monthsData.map(m=>m.days.length));
  const tbody=document.createElement('tbody');
  const skippedUntil=monthsData.map(()=>0);

  for(let i=0;i<maxDays;i++){
    const tr=document.createElement('tr');
    monthsData.forEach((mData,mIdx)=>{
      if(i>=mData.days.length){const td=document.createElement('td');td.colSpan=2;if(mIdx<nb-1)td.style.borderRight='1px solid var(--border)';tr.appendChild(td);return;}
      const{day,dow,iso,evs}=mData.days[i];
      const wknd=dow===0||dow===6;
      const bg=wknd?'var(--weekend)':'#fff',clr=wknd?'var(--accent)':'var(--muted)';

      // Cellule num+jour
      const tdNum=document.createElement('td');
      tdNum.style.cssText=`width:55px;max-width:55px;background:${bg};color:${clr};white-space:nowrap;padding:2px 4px 0;border-right:none;vertical-align:middle`;
      const ns=document.createElement('span');ns.style.cssText="font-family:'DM Mono',monospace;font-size:.72rem;font-weight:"+(wknd?'700':'500');ns.textContent=day;
      const ds=document.createElement('span');ds.style.cssText='font-size:.7rem;margin-left:4px;color:'+clr;ds.textContent=DAYS[dow];
      tdNum.appendChild(ns);tdNum.appendChild(ds);tr.appendChild(tdNum);

      // Cellule label
      if(skippedUntil[mIdx]>i){return;}
      const tdLabel=document.createElement('td');
      tdLabel.className='td-label';
      tdLabel.style.background=bg;
      if(mIdx<nb-1)tdLabel.style.borderRight='1px solid var(--border)';

      const ev=evs[0]; // premier evt du jour
      if(ev){
        const monthEnd=toIso(mData.year,mData.month,mData.days.length);
        const evEnd=ev.end<monthEnd?ev.end:monthEnd;
        const spanDays=Math.round((new Date(evEnd)-new Date(iso))/86400000)+1;
        if(spanDays>1){tdLabel.rowSpan=spanDays;skippedUntil[mIdx]=i+spanDays;}
        tdLabel.style.background=ev.color||'#ccc';
        tdLabel.style.color=ev.textColor||'#fff';
        tdLabel.style.verticalAlign='middle';
        const{l1,l2}=getDisplayLabel(ev);
        const s1=document.createElement('span');s1.className='l1';s1.textContent=l1;tdLabel.appendChild(s1);
        if(l2){const s2=document.createElement('span');s2.className='l2';s2.textContent=l2;tdLabel.appendChild(s2);}
      }
      tr.appendChild(tdLabel);
    });
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);
}

// ── Liste admin ───────────────────────────────
function getRefDate(num) {
  const dist=events.find(e=>e.type==='distribution'&&e.cmdNum===num);
  if (dist) return dist.start;
  const cmd=events.find(e=>e.type==='commande'&&e.cmdNum===num);
  if (cmd) return cmd.start;
  return '9999';
}

function isGroupPast(num, today) {
  // Passé uniquement si la distribution existe ET est passée
  const dist=events.find(e=>e.type==='distribution'&&e.cmdNum===num);
  return dist ? dist.start < today : false;
}

function renderEventList() {
  const container=document.getElementById('evList');
  document.getElementById('evCount').textContent=events.length;
  if(!events.length){container.innerHTML='<p class="empty-msg">Aucun événement</p>';return;}
  container.innerHTML='';

  const today=new Date().toISOString().split('T')[0];

  // Numéros de commandes triés par date de référence
  const cmdNums=[...new Set(events.filter(e=>e.type==='commande'||e.type==='distribution').map(e=>e.cmdNum))];
  cmdNums.sort((a,b)=>getRefDate(a).localeCompare(getRefDate(b)));

  const futureNums=cmdNums.filter(num=>!isGroupPast(num, today));
  const pastNums=cmdNums.filter(num=>isGroupPast(num, today));

  // Libres
  const libres=events.filter(e=>!e.type||e.type==='libre').sort((a,b)=>a.start.localeCompare(b.start));
  const futureLibres=libres.filter(e=>e.end>=today);
  const pastLibres=libres.filter(e=>e.end<today);

  function renderGroup(num){
    const cmd=events.find(e=>e.type==='commande'&&e.cmdNum===num);
    const dist=events.find(e=>e.type==='distribution'&&e.cmdNum===num);
    const group=document.createElement('div');group.className='ev-group';
    const title=document.createElement('div');title.className='ev-group-title';title.textContent=`N° ${num}`;
    group.appendChild(title);
    if(cmd){
      const p=(cmd.label||'').split('+').map(s=>s.trim()).filter(Boolean);
      group.appendChild(makeEvItem(cmd.color,`Commande ${num}`,p[0]||'',`${fmtDate(cmd.start)} → ${fmtDate(cmd.end)}`,null,null));
    }
    if(dist){
      group.appendChild(makeEvItem(dist.color,`Distribution ${num}`,'',fmtDate(dist.start),null,null));
    }
    if(!cmd&&!dist) return null;
    const grpBtns=document.createElement('div');grpBtns.style.cssText='display:flex;gap:4px;margin-top:4px;flex-wrap:wrap';
    const msgBtn=document.createElement('button');msgBtn.className='btn';msgBtn.style.cssText='margin-top:0;padding:5px;font-size:.72rem;flex:1;background:#16a085';
    msgBtn.textContent='📨 Message';msgBtn.onclick=()=>openMsgModal(num);
    const editGrp=document.createElement('button');editGrp.className='btn';editGrp.style.cssText='margin-top:0;padding:5px;font-size:.72rem;flex:1';
    editGrp.textContent=`✏️ Modifier`;editGrp.onclick=()=>editCmdGroup(num);
    const delGrp=document.createElement('button');delGrp.className='btn danger';delGrp.style.cssText='margin-top:0;padding:5px;font-size:.72rem;flex:1';
    delGrp.textContent=`✕ Suppr.`;delGrp.onclick=()=>deleteCmdGroup(num);
    grpBtns.appendChild(msgBtn);grpBtns.appendChild(editGrp);grpBtns.appendChild(delGrp);
    group.appendChild(grpBtns);
    return group;
  }

  // À VENIR
  futureNums.forEach(num=>{const g=renderGroup(num);if(g)container.appendChild(g);});
  if(futureLibres.length){
    const group=document.createElement('div');group.className='ev-group';
    group.appendChild(Object.assign(document.createElement('div'),{className:'ev-group-title',textContent:'Événements libres'}));
    futureLibres.forEach(ev=>{
      const p=(ev.label||'').split('+').map(s=>s.trim()).filter(Boolean);
      group.appendChild(makeEvItem(ev.color,p[0]||'',p[1]||'',`${fmtDate(ev.start)} → ${fmtDate(ev.end)}`,()=>editLibre(ev.id),()=>deleteLibre(ev.id)));
    });
    container.appendChild(group);
  }

  // PASSÉS
  if(pastNums.length||pastLibres.length){
    const pastSection=document.createElement('div');pastSection.className='past-section';
    const pastTitle=document.createElement('div');pastTitle.className='past-title';pastTitle.textContent='Événements passés';
    pastSection.appendChild(pastTitle);
    pastNums.forEach(num=>{const g=renderGroup(num);if(g){g.style.opacity='.55';pastSection.appendChild(g);}});
    pastLibres.forEach(ev=>{
      const p=(ev.label||'').split('+').map(s=>s.trim()).filter(Boolean);
      const item=makeEvItem(ev.color,p[0]||'',p[1]||'',`${fmtDate(ev.start)} → ${fmtDate(ev.end)}`,()=>editLibre(ev.id),()=>deleteLibre(ev.id));
      item.style.opacity='.55';pastSection.appendChild(item);
    });
    container.appendChild(pastSection);
  }
}

function makeEvItem(color,title,sub,dates,onEdit,onDel){
  const item=document.createElement('div');item.className='ev-item';
  const dot=document.createElement('div');dot.className='ev-dot';dot.style.background=color||'#ccc';
  const info=document.createElement('div');info.className='ev-info';
  info.innerHTML=`<strong>${title}</strong>${sub?`<span class="sub">${sub}</span>`:''}<span class="dates">${dates}</span>`;
  item.appendChild(dot);item.appendChild(info);
  if(onEdit||onDel){
    const acts=document.createElement('div');acts.className='ev-actions';
    if(onEdit){const eBtn=document.createElement('button');eBtn.className='edit-btn';eBtn.textContent='✏️';eBtn.onclick=onEdit;acts.appendChild(eBtn);}
    if(onDel){const dBtn=document.createElement('button');dBtn.className='del-btn';dBtn.textContent='✕';dBtn.onclick=onDel;acts.appendChild(dBtn);}
    item.appendChild(acts);
  }
  return item;
}

function shiftMonths(d){startOffset+=d;renderCalendar();}
function renderAll(){renderCalendar();if(isAdmin)renderEventList();}

// ── Init ──────────────────────────────────────
buildAllSwatches();
if(sessionStorage.getItem('calAdmin')==='1') isAdmin=true;
const urlParams=new URLSearchParams(window.location.search);
if(urlParams.has('admin')&&!isAdmin) setTimeout(()=>openLogin(),100);
applyMode();

document.addEventListener('firebase-ready',()=>{fbReady=true;initFirebase();});
document.addEventListener('firebase-failed',()=>{setStatus('ℹ️ Mode local','');loadLocal();});
setTimeout(()=>{if(!fbReady){setStatus('ℹ️ Mode local','');loadLocal();}},1500);

let _lastNb=getNbMonths();
window.addEventListener('resize',()=>{const nb=getNbMonths();if(nb!==_lastNb){_lastNb=nb;renderCalendar();}});
</script>
</body>
